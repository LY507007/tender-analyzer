<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>震坤行招投标附件智能分析</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 顶部导航 -->
  <header class="topbar">
    <div class="topbar-inner">
      <div class="topbar-brand">
        <img src="logo.png" alt="震坤行" class="brand-logo" />
        <span class="brand-name">震坤行招投标附件智能分析</span>
      </div>
      <div class="topbar-right">
        <div class="api-status" id="api-status">
          <span class="status-dot warn" id="status-dot"></span>
          <span id="status-text">未配置 API Key</span>
        </div>
        <button class="btn-config" id="open-settings">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <circle cx="7.5" cy="7.5" r="2.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M7.5 1v1.5M7.5 12.5V14M1 7.5h1.5M12.5 7.5H14M2.9 2.9l1.1 1.1M11 11l1.1 1.1M2.9 12.1L4 11M11 4l1.1-1.1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          配置 API
        </button>
      </div>
    </div>
  </header>

  <main class="page">
    <div class="workspace">

      <!-- 左侧：文件上传 -->
      <section class="panel" id="upload-panel">
        <div class="panel-head">
          <div class="panel-icon blue">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M9 1H4a1 1 0 00-1 1v12a1 1 0 001 1h8a1 1 0 001-1V5L9 1z" stroke="white" stroke-width="1.4" stroke-linejoin="round"/>
              <path d="M9 1v4h4" stroke="white" stroke-width="1.4" stroke-linejoin="round"/>
            </svg>
          </div>
          <h2 class="panel-title">上传文件</h2>
          <span class="panel-count" id="file-count">0 个文件</span>
          <button class="btn-clear" id="clear-files" hidden>清空</button>
        </div>

        <div class="drop-zone" id="drop-zone">
          <div class="drop-visual">
            <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
              <circle cx="22" cy="22" r="21" stroke="#bfdbfe" stroke-width="1.5"/>
              <path d="M22 28V18M22 18l-5 5M22 18l5 5" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M14 32h16" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <p class="drop-main">拖拽文件到此处</p>
            <label class="btn btn-outline" for="file-input">或点击选择文件</label>
            <input type="file" id="file-input" multiple
              accept=".pdf,.docx,.doc,.png,.jpg,.jpeg,.bmp,.gif,.tiff,.webp" hidden />
          </div>
          <div class="drop-hint-bar">
            <span>PDF · Word（docx）· 图片</span>
            <span class="sep">|</span>
            <span class="hint-auto">PDF/文档 → Kimi &nbsp;·&nbsp; 图片/扫描件 → MiniMax</span>
          </div>
        </div>

        <!-- 紧凑型文件标签列表 -->
        <div class="file-chips" id="file-chips"></div>
      </section>

      <!-- 右侧：字段配置 -->
      <section class="panel" id="fields-panel">
        <div class="panel-head">
          <div class="panel-icon indigo">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M2 4h12M2 8h8M2 12h10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <h2 class="panel-title">提取字段</h2>
          <span class="panel-count" id="field-count">0 个字段</span>
        </div>

        <div class="field-tags" id="field-tags"></div>

        <div class="field-add-row">
          <input type="text" id="field-input" class="field-input"
            placeholder="输入字段名称，按 Enter 添加..." autocomplete="off" />
          <button class="btn btn-add" id="add-field-btn">+ 添加</button>
        </div>
      </section>
    </div>

    <!-- 分析按钮 -->
    <div class="action-bar">
      <button class="btn btn-analyze" id="analyze-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="9" r="7.5" stroke="white" stroke-width="1.5"/>
          <path d="M6 9l2 2 4-4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        开始分析
      </button>
    </div>

    <!-- Loading -->
    <div class="loading-wrap" id="loading" hidden>
      <div class="loading-card">
        <div class="spinner"></div>
        <p class="loading-title" id="loading-text">正在分析文件...</p>
        <p class="loading-sub" id="loading-sub">AI 正在读取文档并提取关键信息</p>
      </div>
    </div>

    <!-- 结果 -->
    <section class="result-panel" id="result-section" hidden>
      <div class="result-head">
        <div class="result-head-left">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="1" y="1" width="16" height="16" rx="3" stroke="#16a34a" stroke-width="1.5"/>
            <path d="M5 9l3 3 5-5" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <h2 class="result-title">分析结果</h2>
          <span class="result-meta" id="result-meta"></span>
        </div>
        <button class="btn btn-export" id="export-btn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M7 1v8M7 9L4.5 6.5M7 9l2.5-2.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M1 10v1.5A1.5 1.5 0 002.5 13h9A1.5 1.5 0 0013 11.5V10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          导出 Excel
        </button>
      </div>
      <div class="table-scroll">
        <table id="result-table">
          <thead id="result-thead"></thead>
          <tbody id="result-tbody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- 配置 API Modal -->
  <div class="modal-overlay" id="settings-modal" hidden>
    <div class="modal">
      <div class="modal-head">
        <h3 class="modal-title">API 配置</h3>
        <button class="modal-close" id="close-settings">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="modal-body">
        <div class="api-route-info">
          <div class="route-item">
            <span class="route-badge blue">PDF · Word</span>
            <span class="route-arrow">→</span>
            <span class="route-target">Kimi（长文本，高精度）</span>
          </div>
          <div class="route-item">
            <span class="route-badge purple">图片 · 扫描件</span>
            <span class="route-arrow">→</span>
            <span class="route-target">MiniMax（视觉识别）</span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">
            <span class="label-badge kimi">Kimi</span>
            Kimi API Key
            <span class="form-label-hint">月之暗面 · 用于 PDF / Word 文档</span>
          </label>
          <div class="key-input-wrap">
            <input type="password" id="kimi-key-input" class="form-input"
              placeholder="sk-..." autocomplete="off" />
            <button class="key-toggle" data-target="kimi-key-input">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <ellipse cx="8" cy="8" rx="7" ry="4.5" stroke="currentColor" stroke-width="1.4"/>
                <circle cx="8" cy="8" r="2" fill="currentColor"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">
            <span class="label-badge minimax">MiniMax</span>
            MiniMax API Key
            <span class="form-label-hint">用于图片 / 扫描件 OCR</span>
          </label>
          <div class="key-input-wrap">
            <input type="password" id="minimax-key-input" class="form-input"
              placeholder="请输入 MiniMax API Key" autocomplete="off" />
            <button class="key-toggle" data-target="minimax-key-input">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <ellipse cx="8" cy="8" rx="7" ry="4.5" stroke="currentColor" stroke-width="1.4"/>
                <circle cx="8" cy="8" r="2" fill="currentColor"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">MiniMax 模型</label>
          <select id="minimax-model-select" class="form-select">
            <option value="MiniMax-M1-2.5">MiniMax-M1-2.5（推荐，最新）</option>
            <option value="MiniMax-M1">MiniMax-M1</option>
            <option value="MiniMax-Text-01">MiniMax-Text-01</option>
          </select>
        </div>

        <p class="form-hint">API Key 仅保存在本地浏览器，不会上传至任何服务器</p>
      </div>

      <div class="modal-foot">
        <button class="btn btn-outline-gray" id="cancel-settings">取消</button>
        <button class="btn btn-primary" id="save-settings">保存配置</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
