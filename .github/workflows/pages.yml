name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish frontend to gh-pages
        shell: bash
        run: |
          set -euo pipefail

          rm -rf /tmp/tender-analyzer-pages
          mkdir -p /tmp/tender-analyzer-pages
          cp -R frontend/. /tmp/tender-analyzer-pages/
          touch /tmp/tender-analyzer-pages/.nojekyll

          cd /tmp/tender-analyzer-pages
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy to GitHub Pages"
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git push --force origin gh-pages
